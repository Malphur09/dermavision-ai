name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  web:
    name: Web (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: System deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libgdk-pixbuf-2.0-0 \
            shared-mime-info \
            fonts-dejavu
      - run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt
      - run: pytest api/tests -q

  build-check:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://supabase.test
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          FLASK_INTERNAL_URL: http://api.test:5328
        run: npm run build
