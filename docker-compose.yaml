services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      FLASK_INTERNAL_URL: ${FLASK_INTERNAL_URL:-http://api:5328}
    depends_on:
      - api
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    command: npm run dev:web -- -H 0.0.0.0 -p 3000

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    expose:
      - "5328"
    env_file:
      - .env
    environment:
      PTH_MODEL_PATH: ${PTH_MODEL_PATH:-/models/dermavision_ensemble_3way.pth}
    volumes:
      - .:/app
      - ${PTH_HOST_DIR:-${HOME}/code/dataset}:/models:ro
    command: gunicorn --bind 0.0.0.0:5328 --workers 1 --threads 4 --reload --timeout 120 api.index:app

volumes:
  web_node_modules:
  web_next:
